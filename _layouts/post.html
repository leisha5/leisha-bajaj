---
layout: default
---
<article class="post">
  <a class="back-link" href="{{ '/blog/' | relative_url }}">← Back to Blog</a>

  <header class="post-header">
    <div class="post-meta">
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
      <span>•</span>
      <span>3 min read</span>
    </div>

    <h1>{{ page.title }}</h1>

    {% if page.subtitle %}
      <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}

    {% if page.tags %}
      <div class="post-tags">
        {% for tag in page.tags %}
          <span>{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  {% if page.image %}
    <figure class="post-hero">
      <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt }}">
      {% if page.image_alt %}
        <figcaption>{{ page.image_alt }}</figcaption>
      {% endif %}
    </figure>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>
